                - paragraph [ref=f1e814]:
                  - text: Lists are given the ARIA
                  - code [ref=f1e815]: role="list"
                  - text: and list items are given
                  - code [ref=f1e816]: role="listitem"
                  - text: to ensure that assistive technologies can correctly interpret the structure and semantics of the content.
                - paragraph [ref=f1e817]:
                  - text: Action lists are given the ARIA
                  - code [ref=f1e818]: role="list"
                  - text: and list actions are given
                  - code [ref=f1e819]: role="listitem"
                  - text: to ensure that assistive technologies can correctly interpret the structure and semantics of the content. Each list action includes a nested interactive element with ARIA
                  - code [ref=f1e820]: role="button"
                  - text: . When
                  - code [ref=f1e821]: href
                  - text: is specified, the ARIA role
                  - code [ref=f1e822]: link
                  - text: is used instead of
                  - code [ref=f1e823]: button
                  - text: to convey the list action provides an interactive reference to a resource. In addition, the component presents an internal anchor, hidden from assistive technologies, used to invoke native browser features such a context menu options and tooltips. When disabled using the
                  - code [ref=f1e824]: disabled
                  - text: attribute,
                  - code [ref=f1e825]: aria-disabled="true"
                  - text: is applied to the nested interactive element in order to convey to assistive technologies that the action is disabled.
                - paragraph [ref=f1e826]:
                  - text: Selection lists are given the ARIA
                  - code [ref=f1e827]: role="listbox"
                  - text: and options are given
                  - code [ref=f1e828]: role="option"
                  - text: to ensure that assistive technologies recognize the widget as a selectable list and expose the correct interaction model to users. The
                  - code [ref=f1e829]: aria-selected
                  - text: attribute reflects whether an option is currently selected. When an option is selected,
                  - code [ref=f1e830]: aria-selected="true"
                  - text: is exposed to assistive technologies; otherwise, it is
                  - code [ref=f1e831]: "\"false\""
                  - text: . When disabled using the
                  - code [ref=f1e832]: disabled
                  - text: attribute,
                  - code [ref=f1e833]: aria-disabled="true"
                  - text: is applied to the option in order to convey to assistive technologies that the option is disabled. When multi-select is enabled through the
                  - code [ref=f1e834]: multi
                  - text: attribute,
                  - code [ref=f1e835]: aria-multiselectable="true"
                  - text: is applied to the selection list indicating multiple options can be selected.
                - paragraph [ref=f1e836]:
                  - text: Expandable list items use ARIA
